<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#ff4500"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="/images/icon-192.png"/>
<title>Planzo — Forgot Password</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#ff4500","on-surface":"#f0f0f0","on-surface-variant":"#9ca3af","surface":"#111111","surface-container":"#141414","surface-container-high":"#181818","surface-container-highest":"#1e1e1e","outline-variant":"#2a2a2a"},fontFamily:{sans:["Inter","sans-serif"]},borderRadius:{DEFAULT:"1rem",sm:"0.75rem",md:"1rem",lg:"1.5rem",xl:"2rem",full:"9999px"}}}}</script>
<style>
  *{font-family:'Inter',sans-serif;font-weight:400;}
  h1,h2,h3{font-family:'Clash Display',sans-serif;}
  body{background:#0a0a0a;background-image:radial-gradient(ellipse at 70% 0%,rgba(255,69,0,0.15),transparent 55%),radial-gradient(ellipse at 20% 100%,rgba(156,163,175,0.06),transparent 50%);min-height:100vh;color:#f0f0f0;}
  .glass{background:rgba(17,17,17,0.8);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.07);border-radius:1rem;}
  .input-field{background:#000000 !important;border:1px solid rgba(255,255,255,0.08) !important;border-radius:0.75rem;color:#f0f0f0 !important;padding:0.75rem 1rem;width:100%;transition:border-color 0.2s,box-shadow 0.2s;outline:none;font-family:'Inter',sans-serif;font-size:0.875rem;}
  .input-field:focus{border-color:rgba(255,69,0,0.5);box-shadow:0 0 0 3px rgba(255,69,0,0.1);}
  .input-field::placeholder{color:#6b7280;}
  .btn-primary{background:#ff4500;color:#fff;font-weight:700;padding:0.875rem 1.5rem;border-radius:0.875rem;width:100%;transition:opacity 0.2s,transform 0.1s;cursor:pointer;border:none;font-family:'Inter',sans-serif;letter-spacing:0.02em;box-shadow:0 0 24px rgba(255,69,0,0.3);}
  .btn-primary:hover{opacity:0.9;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp 0.5s ease forwards;}
  input:not([type="checkbox"]):not([type="radio"]), textarea, select {
    background-color: #000000 !important;
    color: #f0f0f0 !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
  }
  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.4) !important;
  }
  input:-webkit-autofill,
  input:-webkit-autofill:hover, 
  input:-webkit-autofill:focus, 
  input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px #000000 inset !important;
    -webkit-text-fill-color: #f0f0f0 !important;
    transition: background-color 5000s ease-in-out 0s;
  }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md fade-up">
  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="/" class="inline-block text-2xl font-black tracking-tighter text-[#ff4500]" style="font-family:'Inter',sans-serif;">Planzo</a>
    <p class="text-on-surface-variant text-sm mt-1">Reset your password</p>
  </div>

  <div class="glass p-8">
    <div class="text-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-[#ff4500]/10 flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-[#ff4500] text-3xl">lock_reset</span>
      </div>
      <h2 class="text-xl font-bold mb-2">Forgot your password?</h2>
      <p class="text-on-surface-variant text-sm">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <!-- Request Form -->
    <form id="forgot-form" onsubmit="handleForgot(event)" class="space-y-4">
      <div>
        <label class="block text-xs text-on-surface-variant mb-1.5 uppercase tracking-widest">Email Address</label>
        <input id="forgot-email" type="email" class="input-field" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div id="forgot-error" class="hidden text-red-400 text-xs py-2 px-3 bg-red-400/10 rounded-lg"></div>
      <div id="forgot-success" class="hidden text-green-400 text-xs py-2 px-3 bg-green-400/10 rounded-lg"></div>
      <button type="submit" id="forgot-btn" class="btn-primary">Send Reset Link</button>
    </form>

    <div class="text-center mt-6">
      <a href="/auth.html" class="text-xs text-on-surface-variant hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined text-xs align-middle mr-1">arrow_back</span>Back to Sign In
      </a>
    </div>
  </div>

  <p class="text-center text-on-surface-variant/40 text-xs mt-6">© 2026 Planzo</p>
</div>

<script src="js/api.js"></script>
<script>
  if (Api.isLoggedIn()) window.location.href = '/dashboard.html';

  async function handleForgot(e) {
    e.preventDefault();
    const btn = document.getElementById('forgot-btn');
    const errEl = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    btn.disabled = true; btn.textContent = 'Sending...';
    errEl.classList.add('hidden');
    successEl.classList.add('hidden');
    try {
      const data = await Api.post('/auth/forgot-password', {
        email: document.getElementById('forgot-email').value,
      });
      if (data.resetLink) {
        successEl.innerHTML = `Success! <a href="${data.resetLink}" class="text-[#ff4500] underline">Click here to reset your password</a>.`;
      } else {
        successEl.textContent = data.message || 'If that email is registered, a reset link has been generated.';
      }
      successEl.classList.remove('hidden');
      btn.textContent = 'Link Generated';
    } catch(err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    }
  }
</script>
<script src="/js/pwa.js"></script>
</body>
</html>
