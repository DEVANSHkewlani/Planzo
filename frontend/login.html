<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        body {
            font-family: 'Epilogue', sans-serif;
            background-color: #050505;
        }
        .liquid-glass {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter:blur(28px);
            -webkit-backdrop-filter:blur(28px);
        }
        .ambient-glow {
            background: radial-gradient(circle at top right, rgba(255,69,0, 0.08), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(255,69,0, 0.03), transparent 40%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    
  /* Global Dark Form Styles Reset */
  input:not([type="checkbox"]):not([type="radio"]), textarea, select {
    background-color: rgba(255,255,255,0.05) !important;
    color: #f0f0f0 !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
  }
  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.4) !important;
  }

</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Ambient Background Texture -->
<div class="fixed inset-0 ambient-glow pointer-events-none z-0"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center p-6">
<!-- Login Card -->
<div class="liquid-glass w-full max-w-[440px] rounded-2xl p-10 shadow-[0_40px_100px_-20px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden group">
<!-- Subtle internal glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/10 blur-[80px] rounded-2xl"></div>
<!-- Brand Header -->
<div class="mb-12 text-center">
<h1 class="text-4xl font-extrabold tracking-tighter text-on-surface mb-2">Planzo</h1>
<p class="text-on-surface-variant font-medium tracking-tight opacity-70">Elevate your focus.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/80 ml-1">Username or Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest/50 border-none rounded-2xl px-4 py-4 text-on-surface placeholder:text-on-secondary-container/30 focus:ring-1 focus:ring-primary-container transition-all duration-300" placeholder="curator@ethereal.io" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/80">Password</label>
<a class="text-[10px] uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest/50 border-none rounded-2xl px-4 py-4 text-on-surface placeholder:text-on-secondary-container/30 focus:ring-1 focus:ring-primary-container transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-bold py-4 rounded-2xl shadow-[0_8px_24px_-4px_rgba(255,69,0,0.4)] hover:scale-[1.02] active:scale-95 transition-all duration-300 mt-4" type="submit">
                    Login
                </button>
</form>
<!-- Divider Section -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="mx-4 text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/40 font-bold">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 bg-surface-container-high/40 border border-outline-variant/10 py-3 rounded-2xl hover:bg-surface-container-highest/60 transition-all duration-300">
<img alt="" class="w-5 h-5 opacity-80" data-alt="Google colorful logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnKiQrolta9pslP0tD74_JQ3PnDjVFWe7vUA9BKMUHoSNCtYsA6YC61p5ohrIHgX3rjVRlRaJ2tXCneif_xTVi8X0oP6Nn6uueoINQLclAp-4XzZLoBOYczu-ohE6EJGr5azYAEXhOKtQWN4Bz3GRy1aeWKTc3KtHDsBmMOIUGyzQAp1-UOisstqYfQ8rZsbmeISdmO30e6aORCAMWKX1uWIbGRbZlngx5lqaC1d80GfmlEHx2Q212Be8xF1EpoxoqSBnlt9c0UUU"/>
<span class="text-xs font-semibold tracking-tight text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-high/40 border border-outline-variant/10 py-3 rounded-2xl hover:bg-surface-container-highest/60 transition-all duration-300">
<img alt="" class="w-4 h-4" data-alt="Microsoft square logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuh__TsqKqhrPsf-GWk-2l29zP7C8LE0Bt34NCwRImbu7zjvaIykfWTCOX2jtGVnqGyzBzB_n9HWqoLYCiYtOy_3vvCWql2ELibEqF_julncyYA2B9aAsdiT5nnbvikIH6i-9cYnLN5bYq6F64OmK3C8ffETs5Y6d8MWPbSQfsX26_jbAB16NrhMP9GhKHxJG4cBgN-ye2yAzKN3mzGewljyHfyCaZVaivAbIY7k7F1BVqfRuLAeha2sIR6pjOFD-xR0F4OHbhWSg"/>
<span class="text-xs font-semibold tracking-tight text-on-surface">Microsoft</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center">
<p class="text-xs text-on-surface-variant/60 font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30 transition-all" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Content Footer (Minimal Editorial) -->
<footer class="relative z-10 w-full py-8 px-10 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-outline-variant/5">
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant/40">© 2024 Planzo Workspace. Systems Active.</p>
<div class="flex gap-8">
<a class="text-[10px] uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[10px] uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Security</a>
</div>
</footer>
<script src="/js/pwa.js"></script>
</body></html>
