  input:not([type="checkbox"]):not([type="radio"]), textarea, select {

<body class="bg-background text-on-surface font-body selection:bg-primary-container/30 min-h-screen overflow-x-hidden liquid-bg flex flex-col">
<!-- Top Navigation (Shell logic: Minimal/Focused journey - Navigation suppressed) -->
<header class="w-full px-8 py-12 flex justify-center items-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-2xl bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-xl" data-icon="grid_view">grid_view</span>
</div>
<span class="text-2xl font-bold tracking-tighter text-on-surface">Planzo</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pb-24">
<div class="w-full max-max-w-md">
<!-- Glassmorphic Container -->
<div class="glass-card rounded-2xl p-8 md:p-12 shadow-[0_8px_32px_0_rgba(255,69,0,0.04)] ring-1 ring-outline-variant/20">
<div class="space-y-2 mb-10 text-center">

<p class="text-on-surface-variant font-medium">Create your ethereal workspace today.</p>
</div>
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 rounded-2xl px-4 py-4 text-on-surface placeholder:text-on-secondary-container focus:ring-2 focus:ring-primary-container focus:bg-surface-container-low transition-all duration-300" id="username" placeholder="curator_name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 rounded-2xl px-4 py-4 text-on-surface placeholder:text-on-secondary-container focus:ring-2 focus:ring-primary-container focus:bg-surface-container-low transition-all duration-300" id="email" placeholder="you@vision.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 rounded-2xl px-4 py-4 text-on-surface placeholder:text-on-secondary-container focus:ring-2 focus:ring-primary-container focus:bg-surface-container-low transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-bold py-4 rounded-2xl shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all duration-300 mt-4" type="submit">
                        Create Account
                    </button>
</form>
<!-- Social Auth Section -->
<div class="mt-10">
<div class="relative flex items-center gap-4 mb-8">
<div class="h-px bg-outline-variant/20 flex-grow"></div>
<span class="text-[10px] uppercase tracking-[0.2em] font-bold text-on-secondary-container whitespace-nowrap">Or join with</span>
<div class="h-px bg-outline-variant/20 flex-grow"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high ring-1 ring-outline-variant/20 rounded-2xl py-3.5 transition-all duration-200">

</button>

<img alt="" class="w-5 h-5" data-alt="Microsoft square logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWwpf6sUqsnAQeAf1VLQf7YdxnYa-dbpcJ3wj1gDIjwam8UgdPWSZfMIPkQnEukMyMeKcGfB0XJInC1OLJlBNcocW7EcqAk6o4PU0v_RzumCnGvIMO7qFQ2lSNuj6KyHyEFnTo7asN5FueEvxzkpiM1vjvPMP8An6LksxOjYJvDf--ctf05zhCiB-a-BNcNM0NugtxblEv8_aO0c7FOwRHCkuqf-Of3lPlGt-3_EgLHEpw2l7x25xXYgY0ScnQZfJresHItpzppAk"/>
<span class="text-sm font-semibold text-on-surface">Microsoft</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant font-medium">
                        Already have an account? 
                        <a class="text-primary hover:text-primary-container transition-colors ml-1 font-bold" href="#">Login</a>
</p>
</div>
</div>

<div class="text-lg font-bold text-neutral-200 tracking-tighter">Planzo</div>
<div class="flex gap-6">

<a class="font-['Epilogue'] text-xs uppercase tracking-widest text-neutral-500 hover:text-red-500 transition-colors duration-200" href="#">Terms of Service</a>

<p class="font-['Epilogue'] text-xs uppercase tracking-widest text-neutral-500">© 2024 Ethereal Workspace. All rights reserved.</p>
