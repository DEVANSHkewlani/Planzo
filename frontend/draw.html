<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#ff4500"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="/images/icon-192.png"/>
<title>Planzo — Draw</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{primary:"#ff4500","on-surface":"#f0f0f0","on-surface-variant":"#9ca3af","surface":"#111111","surface-container":"#141414","surface-container-high":"#181818","surface-container-highest":"#1e1e1e","outline-variant":"#2a2a2a","accent-yellow":"#E8D44D","accent-green":"#4ADE80","accent-purple":"#C084FC","accent-pink":"#F472B6"},fontFamily:{display:["'Clash Display'","sans-serif"],body:["'Inter'","sans-serif"]},borderRadius:{DEFAULT:"1rem",sm:"0.75rem",md:"1rem",lg:"1.5rem",xl:"2rem",full:"9999px"}}}}</script>
<style>
  *{font-family:'Inter',sans-serif;font-weight:400;}
  h1,h2,h3,h4,.font-display{font-family:'Clash Display',sans-serif;}
  body{background:#0c0c0c;height:100vh;display:flex;flex-direction:column;color:#f0f0f0;overflow:hidden;}
  .glass{background:rgba(20,20,20,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:1rem;}
  #canvas{cursor:crosshair;display:block;touch-action:none;}
  .tool-btn{width:36px;height:36px;border-radius:8px;border:none;background:rgba(255,255,255,0.04);color:#9ca3af;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
  .tool-btn:hover,.tool-btn.active{background:rgba(255,69,0,0.15);color:#ff4500;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

  /* Global Dark Form Styles Reset */
  input:not([type="checkbox"]):not([type="radio"]), textarea, select {
    background-color: #000000 !important;
    color: #f0f0f0 !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
  }
  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.4) !important;
  }


/* Sidebar */
  .sidebar{background:#101010;border-right:1px solid rgba(255,255,255,0.04);width:240px;min-height:100vh;position:fixed;left:0;top:0;z-index:40;display:flex;flex-direction:column;transition:transform 0.3s ease;}
  .sidebar-link{display:flex;align-items:center;gap:12px;padding:10px 20px;color:#6b7280;font-size:13px;font-weight:400;border-radius:10px;margin:2px 12px;transition:all 0.2s;}
  .sidebar-link:hover{background:rgba(255,255,255,0.04);color:#e5e5e5;}
  .sidebar-link.active{background:rgba(255,69,0,0.08);color:#ff4500;font-weight:500;}
  .sidebar-link .material-symbols-outlined{font-size:20px;}

  /* Stat cards with colored accents */
  .stat-card{border-radius:16px;padding:20px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.12;border-radius:16px;}
  .stat-card-yellow{background:#181600;}
  .stat-card-yellow::before{background:linear-gradient(135deg,#E8D44D,transparent 70%);}
  .stat-card-green{background:#001808;}
  .stat-card-green::before{background:linear-gradient(135deg,#4ADE80,transparent 70%);}
  .stat-card-purple{background:#110024;}
  .stat-card-purple::before{background:linear-gradient(135deg,#C084FC,transparent 70%);}

  .project-card{background:rgba(20,20,20,0.9);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:20px;transition:all 0.25s;cursor:pointer;}
  .project-card:hover{border-color:rgba(255,69,0,0.25);background:rgba(30,30,30,0.9);transform:translateY(-2px);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  .fade-up{animation:fadeUp 0.4s ease forwards;}

  .input-styled{background:#000000;border:1px solid rgba(255,255,255,0.08);border-radius:0.75rem;color:#f0f0f0;padding:0.75rem 1rem;font-family:'Inter',sans-serif;font-size:0.875rem;outline:none;transition:border-color 0.2s;width:100%;}
  .input-styled:focus{border-color:rgba(255,69,0,0.5);}
  .input-styled::placeholder{color:#6b7280;}

  /* Dark form reset */
  input:not([type="checkbox"]):not([type="radio"]), textarea, select {
    background-color: #000000 !important;
    color: #f0f0f0 !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
  }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35) !important; }

  /* Mobile: hide sidebar, show bottom nav */
  @media (max-width: 768px) {
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main-content{margin-left:0 !important;}
    .mobile-header{display:flex !important;}
  }
  @media (min-width: 769px) {
    .mobile-header{display:none !important;}
  }
</style>
</head>
<body>
<!-- Sidebar (Desktop) -->
<aside class="sidebar no-scrollbar">
  <div class="px-6 pt-6 pb-4">
    <div class="flex items-center gap-2.5 mb-1">
      <img src="/images/icon-192.png" alt="Planzo" class="w-8 h-8 rounded-lg"/>
      <span class="text-lg font-display font-semibold text-white tracking-tight">Planzo</span>
    </div>
  </div>

  <nav class="flex-1 py-2">
    <a href="dashboard.html" class="sidebar-link">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">dashboard</span>Dashboard
    </a>
    <a href="projects.html" class="sidebar-link">
      <span class="material-symbols-outlined">folder</span>Projects
    </a>
    <a href="calendar.html" class="sidebar-link">
      <span class="material-symbols-outlined">calendar_today</span>Calendar
    </a>
    <a href="draw.html" class="sidebar-link active">
      <span class="material-symbols-outlined">draw</span>Whiteboard
    </a>

    <div class="mt-6 mb-2 px-6">
      <div class="h-px bg-white/5"></div>
    </div>

    <a href="notifications.html" class="sidebar-link" id="notif-link">
      <span class="material-symbols-outlined">notifications</span>Notifications
      <span id="notif-badge" class="hidden ml-auto text-[10px] bg-[#ff4500] text-white w-5 h-5 rounded-full flex items-center justify-center font-semibold"></span>
    </a>
    <a href="settings.html" class="sidebar-link">
      <span class="material-symbols-outlined">settings</span>Settings
    </a>
  </nav>

  <div class="p-4 border-t border-white/5">
    <button id="logout-btn" class="sidebar-link w-full text-red-400 hover:text-red-300 hover:bg-red-400/5">
      <span class="material-symbols-outlined">logout</span>Logout
    </button>
  </div>
</aside>

<!-- Mobile Header -->
<header class="mobile-header hidden sticky top-0 z-50 items-center justify-between px-4 py-3 bg-[#0c0c0c]/90 backdrop-blur border-b border-white/5">
  <button id="menu-toggle" class="material-symbols-outlined text-on-surface-variant">menu</button>
  <span class="font-display font-semibold text-base">Planzo</span>
  <div class="flex gap-2">
    <a href="notifications.html" class="material-symbols-outlined text-on-surface-variant text-xl relative">notifications
      <span id="notif-badge-mobile" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-[#ff4500] rounded-full text-white text-[8px] flex items-center justify-center font-bold"></span>
    </a>
    <button id="logout-btn-mobile" class="material-symbols-outlined text-on-surface-variant text-xl">logout</button>
  </div>
</header>

<!-- Sidebar overlay for mobile -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30" onclick="toggleSidebar()"></div>

<main class="main-content flex flex-col min-h-screen" style="margin-left:240px;">

  <div class="px-6 md:px-10 py-6 max-w-[1400px] mx-auto w-full flex-1">
    <div class="flex items-center gap-4 mb-6">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 text-white/70 hover:text-white transition-colors border border-white/10">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </div>

<!-- Toolbar -->
<div style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(17,17,17,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;flex-wrap:wrap;">
  <a href="javascript:history.back()" class="tool-btn"><span class="material-symbols-outlined">arrow_back</span></a>
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
  <button id="tool-pen" class="tool-btn active" onclick="setTool('pen')" title="Pen"><span class="material-symbols-outlined">edit</span></button>
  <button id="tool-rect" class="tool-btn" onclick="setTool('rect')" title="Rectangle"><span class="material-symbols-outlined">rectangle</span></button>
  <button id="tool-circle" class="tool-btn" onclick="setTool('circle')" title="Circle"><span class="material-symbols-outlined">circle</span></button>
  <button id="tool-line" class="tool-btn" onclick="setTool('line')" title="Line"><span class="material-symbols-outlined">horizontal_rule</span></button>
  <button id="tool-text" class="tool-btn" onclick="setTool('text')" title="Text"><span class="material-symbols-outlined">text_fields</span></button>
  <button id="tool-eraser" class="tool-btn" onclick="setTool('eraser')" title="Eraser"><span class="material-symbols-outlined">backspace</span></button>
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
  <input type="color" id="color-picker" value="#ff4500" title="Color" style="width:32px;height:32px;border-radius:8px;border:2px solid rgba(255,255,255,0.1);cursor:pointer;background:none;padding:2px;">
  <input type="range" id="brush-size" min="1" max="40" value="3" title="Size" style="width:80px;accent-color:#ff4500;">
  <div style="width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px;"></div>
  <button class="tool-btn" onclick="undo()" title="Undo"><span class="material-symbols-outlined">undo</span></button>
  <button class="tool-btn" onclick="clearCanvas()" title="Clear"><span class="material-symbols-outlined">clear_all</span></button>
  <div style="flex:1;"></div>
  <button onclick="downloadDrawing()" class="tool-btn" title="Download as PNG"><span class="material-symbols-outlined">download</span></button>
  <button onclick="saveDrawing()" style="background:#ff4500;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;" id="save-btn">Save</button>
</div>

<canvas id="canvas"></canvas>
  </div>
</main>

<script src="js/api.js"></script>
<script>
if (!Api.isLoggedIn()) window.location.href = '/auth.html';

const params = new URLSearchParams(location.search);
const projectId = params.get('projectId');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let tool = 'pen', color = '#ff4500', size = 3;
let drawing = false, startX = 0, startY = 0;
let history = [], currentPath = [];
let snapshot;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = (window.innerHeight - 56) * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = (window.innerHeight - 56) + 'px';
  ctx.scale(dpr, dpr);
  redraw();
}
window.addEventListener('resize', resize); resize();

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn[id^="tool-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t)?.classList.add('active');
  canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'text' ? 'text' : 'crosshair';
}

document.getElementById('color-picker').addEventListener('input', e => color = e.target.value);
document.getElementById('brush-size').addEventListener('input', e => size = +e.target.value);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - r.left, src.clientY - r.top];
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); }, { passive: false });

function startDraw(e) {
  drawing = true;
  [startX, startY] = getPos(e);
  if (tool === 'text') {
    const text = prompt('Enter text:');
    if (text) {
      history.push({ type: 'text', text, x: startX, y: startY, color, size: size * 4 + 8 });
      redraw();
    }
    drawing = false; return;
  }
  snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  if (tool === 'pen' || tool === 'eraser') currentPath = [[startX, startY]];
}

function draw(e) {
  if (!drawing) return;
  const [x, y] = getPos(e);
  if (tool === 'pen' || tool === 'eraser') {
    ctx.putImageData(snapshot, 0, 0);
    currentPath.push([x, y]);
    ctx.beginPath(); ctx.moveTo(currentPath[0][0], currentPath[0][1]);
    currentPath.forEach(([px, py]) => ctx.lineTo(px, py));
    ctx.strokeStyle = tool === 'eraser' ? '#0a0a0a' : color;
    ctx.lineWidth = tool === 'eraser' ? size * 3 : size;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  } else {
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round';
    ctx.beginPath();
    if (tool === 'rect') ctx.strokeRect(startX, startY, x - startX, y - startY);
    else if (tool === 'circle') {
      const rx = Math.abs(x - startX) / 2, ry = Math.abs(y - startY) / 2;
      ctx.ellipse(startX + (x - startX) / 2, startY + (y - startY) / 2, rx, ry, 0, 0, 2 * Math.PI);
      ctx.stroke();
    } else if (tool === 'line') {
      ctx.moveTo(startX, startY); ctx.lineTo(x, y); ctx.stroke();
    }
  }
}

function endDraw(e) {
  if (!drawing) return; drawing = false;
  const [x, y] = getPos(e);
  if (tool === 'pen' || tool === 'eraser') history.push({ type: tool, path: [...currentPath], color: tool === 'eraser' ? '#0a0a0a' : color, size: tool === 'eraser' ? size * 3 : size });
  else if (tool === 'rect') history.push({ type: 'rect', x: startX, y: startY, w: x - startX, h: y - startY, color, size });
  else if (tool === 'circle') history.push({ type: 'circle', cx: startX + (x - startX) / 2, cy: startY + (y - startY) / 2, rx: Math.abs(x - startX) / 2, ry: Math.abs(y - startY) / 2, color, size });
  else if (tool === 'line') history.push({ type: 'line', x1: startX, y1: startY, x2: x, y2: y, color, size });
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  history.forEach(el => drawElement(el));
}

function drawElement(el) {
  ctx.strokeStyle = el.color; ctx.lineWidth = el.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (el.type === 'pen' || el.type === 'eraser') {
    if (!el.path?.length) return;
    ctx.beginPath(); ctx.moveTo(el.path[0][0], el.path[0][1]);
    el.path.forEach(([x,y]) => ctx.lineTo(x,y)); ctx.stroke();
  } else if (el.type === 'rect') {
    ctx.beginPath(); ctx.strokeRect(el.x, el.y, el.w, el.h);
  } else if (el.type === 'circle') {
    ctx.beginPath(); ctx.ellipse(el.cx, el.cy, el.rx, el.ry, 0, 0, 2 * Math.PI); ctx.stroke();
  } else if (el.type === 'line') {
    ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
  } else if (el.type === 'text') {
    ctx.font = `${el.size}px Martian Mono`; ctx.fillStyle = el.color; ctx.fillText(el.text, el.x, el.y);
  }
}

function undo() { history.pop(); redraw(); }
function clearCanvas() { if (confirm('Clear the drawing?')) { history = []; redraw(); } }

function downloadDrawing() {
  const link = document.createElement('a');
  link.download = 'planzo-whiteboard-' + new Date().toISOString().slice(0,10) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Drawing downloaded!', 'success');
}

async function saveDrawing() {
  if (!projectId) { showToast('No project linked', 'error'); return; }
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try { await Api.drawing.save(projectId, history); showToast('Drawing saved!', 'success'); }
  catch { showToast('Save failed', 'error'); }
  btn.textContent = 'Save'; btn.disabled = false;
}

// Load saved drawing
async function loadDrawing() {
  if (!projectId) return;
  try {
    const data = await Api.drawing.get(projectId);
    history = JSON.parse(data.data_json || '[]');
    redraw();
  } catch {}
}

loadDrawing();

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('hidden');
}
document.getElementById('menu-toggle')?.addEventListener('click', toggleSidebar);

  // Handle logout from sidebar
  document.getElementById('logout-btn')?.addEventListener('click', () => { Api.auth.logout(); window.location.href = '/login.html'; });
  document.getElementById('logout-btn-mobile')?.addEventListener('click', () => { Api.auth.logout(); window.location.href = '/login.html'; });

</script>
<script src="/js/pwa.js"></script>
</body>
</html>
